name: Monthly snapshot refresh

# Runs scripts/snapshot.js for every city on a monthly schedule. Cafés
# <90 days old are skipped automatically (per-place rule in the script),
# so this only spends Claude tokens on stale or new entries. The result
# is opened as ONE combined PR so a human reviews the full JSON diff
# across all cities before it goes live. One PR (vs. 6 per-city PRs)
# avoids review fatigue and merge conflicts — see CHANGES.md for the
# rationale.
#
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions):
#   GOOGLE_PLACES_API_KEY
#   ANTHROPIC_API_KEY

on:
  schedule:
    # 09:00 UTC on the 1st of every month
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-pull every café (ignore 90-day rule)"
        required: false
        default: "false"
      city:
        description: "Target a single city slug (e.g. boca-raton). Leave blank for all cities."
        required: false
        default: ""

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Refresh snapshots
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # City list — keep in sync with lib/cities.js (the real source).
          # We serialise rather than fan out via matrix so the run produces
          # one combined PR. Per-city errors don't abort the rest.
          if [ -n "${{ inputs.city }}" ]; then
            CITIES="${{ inputs.city }}"
          else
            CITIES="boca-raton delray-beach boynton-beach deerfield-beach fort-lauderdale miami parkland slidell gulfport biloxi"
          fi
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          for slug in $CITIES; do
            echo "═══════════════════════════════════════════════"
            echo "  $slug"
            echo "═══════════════════════════════════════════════"
            node scripts/snapshot.js --city=$slug $FORCE_FLAG || echo "⚠️  $slug failed — continuing"
          done

      - name: Open PR if snapshots changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: monthly snapshot refresh (all cities)"
          title: "Snapshot refresh — all cities"
          body: |
            Automated monthly snapshot refresh across all configured cities.

            **Review before merging:**
            - Any obvious chains/non-cafés that slipped through?
            - Picks that swung wildly (drink/food changed completely)?
            - Newly added or dropped cafés make sense?

            Snapshot rule: per-café 90-day clock, hard block, whole-pipeline pull.
            City list mirrors `lib/cities.js`.
          branch: snapshot/monthly-refresh
          delete-branch: true
          labels: snapshot, automated
