# fly.toml — Fly.io deployment config for JoeQuest
# Run: fly launch --no-deploy   then   fly secrets set ...   then   fly deploy

app = "joequest"
primary_region = "mia"   # Miami, closest to Boca

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/status"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
