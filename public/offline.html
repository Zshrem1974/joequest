<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#D98324" />
  <title>JoeQuest — Offline</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --espresso: #5E3E27;
      --espresso-deep: #2B1C12;
      --crema: #D98324;
      --oat: #F5E9DC;
      --cream: #FFF6EC;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--oat);
      color: var(--espresso-deep);
      font-family: "Inter", system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 32px;
      text-align: center;
    }
    .wrap { max-width: 360px; }
    .logo {
      width: 96px; height: 96px; margin: 0 auto 24px;
      border-radius: 22px;
      background: var(--crema);
      display: grid; place-items: center;
      box-shadow: 0 6px 20px rgba(43,28,18,0.18);
    }
    .logo img { width: 64px; height: 64px; }
    h1 {
      font-family: "Poppins", "Inter", system-ui, sans-serif;
      font-weight: 600;
      font-size: 24px;
      letter-spacing: -0.4px;
      margin: 0 0 12px;
      color: var(--espresso-deep);
    }
    p {
      font-size: 15px;
      line-height: 1.5;
      color: var(--espresso);
      margin: 0 0 24px;
    }
    button {
      font-family: inherit;
      font-weight: 600;
      font-size: 15px;
      background: var(--espresso);
      color: var(--cream);
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      cursor: pointer;
      transition: transform 0.12s, background 0.12s;
    }
    button:hover { background: var(--espresso-deep); }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo"><img src="/img/joequest-icon.svg" alt="" /></div>
    <h1>You're offline</h1>
    <p>JoeQuest needs a connection to find your coffee. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </main>
</body>
</html>
